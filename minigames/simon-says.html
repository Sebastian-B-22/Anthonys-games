<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simon Says</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            color: #fff;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 5px;
        }
        h1 { font-size: 2.5rem; margin-bottom: 20px; }
        .stats { font-size: 1.5rem; margin-bottom: 30px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 120px);
            gap: 10px;
        }
        .btn {
            width: 120px;
            height: 120px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.1s;
            border: 4px solid rgba(255,255,255,0.3);
        }
        .btn:active, .btn.active { transform: scale(0.95); filter: brightness(1.5); }
        .red { background: #e74c3c; }
        .blue { background: #3498db; }
        .green { background: #2ecc71; }
        .yellow { background: #f1c40f; }
        button {
            margin-top: 30px;
            padding: 15px 30px;
            font-size: 1.2rem;
            background: #9b59b6;
            border: none;
            color: white;
            border-radius: 10px;
            cursor: pointer;
        }
        #message { margin-top: 20px; font-size: 1.2rem; }
    </style>
</head>
<body>
    <a href="./" class="back-btn">← Back</a>
    <h1>🔴 Simon Says</h1>
    <div class="stats">Score: <span id="score">0</span></div>
    <div class="grid">
        <div class="btn red" data-color="red"></div>
        <div class="btn blue" data-color="blue"></div>
        <div class="btn green" data-color="green"></div>
        <div class="btn yellow" data-color="yellow"></div>
    </div>
    <div id="message">Press Start to begin!</div>
    <button id="startBtn">Start Game</button>
    
    <script>
        const colors = ['red', 'blue', 'green', 'yellow'];
        const buttons = document.querySelectorAll('.btn');
        const scoreDisplay = document.getElementById('score');
        const message = document.getElementById('message');
        const startBtn = document.getElementById('startBtn');
        
        let sequence = [];
        let playerIndex = 0;
        let canClick = false;
        let score = 0;
        
        buttons.forEach(btn => {
            btn.addEventListener('click', () => {
                if (!canClick) return;
                
                const color = btn.dataset.color;
                flashButton(btn);
                
                if (color === sequence[playerIndex]) {
                    playerIndex++;
                    
                    if (playerIndex === sequence.length) {
                        score++;
                        scoreDisplay.textContent = score;
                        canClick = false;
                        message.textContent = 'Correct! Watch the next sequence...';
                        setTimeout(nextRound, 1000);
                    }
                } else {
                    canClick = false;
                    message.textContent = `Game Over! Final Score: ${score}`;
                    startBtn.style.display = 'block';
                    startBtn.textContent = 'Play Again';
                }
            });
        });
        
        function flashButton(btn) {
            btn.classList.add('active');
            setTimeout(() => btn.classList.remove('active'), 300);
        }
        
        function playSequence() {
            canClick = false;
            message.textContent = 'Watch carefully...';
            
            let i = 0;
            const interval = setInterval(() => {
                const color = sequence[i];
                const btn = document.querySelector(`[data-color="${color}"]`);
                flashButton(btn);
                i++;
                
                if (i >= sequence.length) {
                    clearInterval(interval);
                    setTimeout(() => {
                        canClick = true;
                        playerIndex = 0;
                        message.textContent = 'Your turn! Repeat the pattern.';
                    }, 500);
                }
            }, 600);
        }
        
        function nextRound() {
            const randomColor = colors[Math.floor(Math.random() * 4)];
            sequence.push(randomColor);
            playSequence();
        }
        
        startBtn.addEventListener('click', () => {
            sequence = [];
            score = 0;
            scoreDisplay.textContent = '0';
            startBtn.style.display = 'none';
            nextRound();
        });
    </script>
</body>
</html>
