<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Match</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 20px;
        }
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            color: #fff;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 5px;
        }
        h1 { font-size: 2.5rem; margin-bottom: 20px; }
        .stats { font-size: 1.3rem; margin-bottom: 20px; }
        .grid {
            display: grid;
            grid-template-columns: repeat(4, 80px);
            gap: 10px;
        }
        .card {
            width: 80px;
            height: 80px;
            background: #3498db;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .card.flipped { background: #2ecc71; }
        .card.matched { background: #9b59b6; cursor: default; }
        button {
            margin-top: 30px;
            padding: 15px 30px;
            font-size: 1.2rem;
            background: #e74c3c;
            border: none;
            color: white;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <a href="./" class="back-btn">← Back</a>
    <h1>🃏 Memory Match</h1>
    <div class="stats">
        Moves: <span id="moves">0</span> | Pairs: <span id="pairs">0</span>/8
    </div>
    <div class="grid" id="grid"></div>
    <button id="restartBtn">New Game</button>
    
    <script>
        const emojis = ['🎮', '🎯', '🎲', '🎪', '🎨', '🎭', '🎪', '🎵'];
        let cards = [...emojis, ...emojis];
        let flippedCards = [];
        let matchedPairs = 0;
        let moves = 0;
        let canFlip = true;
        
        const grid = document.getElementById('grid');
        const movesDisplay = document.getElementById('moves');
        const pairsDisplay = document.getElementById('pairs');
        const restartBtn = document.getElementById('restartBtn');
        
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }
        
        function createGame() {
            grid.innerHTML = '';
            cards = shuffle([...emojis, ...emojis]);
            flippedCards = [];
            matchedPairs = 0;
            moves = 0;
            canFlip = true;
            movesDisplay.textContent = '0';
            pairsDisplay.textContent = '0';
            
            cards.forEach((emoji, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.emoji = emoji;
                card.dataset.index = index;
                card.textContent = '?';
                card.addEventListener('click', () => flipCard(card));
                grid.appendChild(card);
            });
        }
        
        function flipCard(card) {
            if (!canFlip || card.classList.contains('flipped') || card.classList.contains('matched')) return;
            
            card.textContent = card.dataset.emoji;
            card.classList.add('flipped');
            flippedCards.push(card);
            
            if (flippedCards.length === 2) {
                moves++;
                movesDisplay.textContent = moves;
                canFlip = false;
                
                if (flippedCards[0].dataset.emoji === flippedCards[1].dataset.emoji) {
                    flippedCards.forEach(c => c.classList.add('matched'));
                    matchedPairs++;
                    pairsDisplay.textContent = matchedPairs;
                    flippedCards = [];
                    canFlip = true;
                    
                    if (matchedPairs === 8) {
                        setTimeout(() => alert(`You won in ${moves} moves!`), 300);
                    }
                } else {
                    setTimeout(() => {
                        flippedCards.forEach(c => {
                            c.textContent = '?';
                            c.classList.remove('flipped');
                        });
                        flippedCards = [];
                        canFlip = true;
                    }, 1000);
                }
            }
        }
        
        restartBtn.addEventListener('click', createGame);
        createGame();
    </script>
</body>
</html>
