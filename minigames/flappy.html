<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Jump</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.5);
            color: #fff;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 5px;
            z-index: 10;
        }
        h1 { font-size: 2.5rem; margin-bottom: 10px; }
        .stats { font-size: 1.5rem; margin-bottom: 20px; }
        canvas {
            border: 4px solid #f1c40f;
            border-radius: 10px;
        }
        .controls { margin-top: 15px; color: #888; }
        button {
            margin-top: 15px;
            padding: 12px 25px;
            font-size: 1.1rem;
            background: #f1c40f;
            border: none;
            color: #000;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <a href="./" class="back-btn">← Back</a>
    <h1>🐦 Flappy Jump</h1>
    <div class="stats">Score: <span id="score">0</span></div>
    <canvas id="game" width="400" height="500"></canvas>
    <p class="controls">Click or press Space to jump!</p>
    <button id="startBtn">Start Game</button>
    
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');
        const startBtn = document.getElementById('startBtn');
        
        const birdSize = 25;
        const pipeWidth = 60;
        const pipeGap = 150;
        
        let birdY = canvas.height / 2;
        let birdVelocity = 0;
        const gravity = 0.5;
        const jumpStrength = -8;
        
        let pipes = [];
        let score = 0;
        let gameRunning = false;
        let animationId;
        
        function draw() {
            // Sky gradient
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#87CEEB');
            gradient.addColorStop(1, '#4A90D9');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Pipes
            ctx.fillStyle = '#2ecc71';
            pipes.forEach(pipe => {
                // Top pipe
                ctx.fillRect(pipe.x, 0, pipeWidth, pipe.topHeight);
                ctx.fillStyle = '#27ae60';
                ctx.fillRect(pipe.x - 5, pipe.topHeight - 20, pipeWidth + 10, 20);
                ctx.fillStyle = '#2ecc71';
                
                // Bottom pipe
                const bottomY = pipe.topHeight + pipeGap;
                ctx.fillRect(pipe.x, bottomY, pipeWidth, canvas.height - bottomY);
                ctx.fillStyle = '#27ae60';
                ctx.fillRect(pipe.x - 5, bottomY, pipeWidth + 10, 20);
                ctx.fillStyle = '#2ecc71';
            });
            
            // Bird
            ctx.fillStyle = '#f1c40f';
            ctx.beginPath();
            ctx.arc(80, birdY, birdSize, 0, Math.PI * 2);
            ctx.fill();
            
            // Bird eye
            ctx.fillStyle = '#000';
            ctx.beginPath();
            ctx.arc(88, birdY - 5, 5, 0, Math.PI * 2);
            ctx.fill();
            
            // Bird beak
            ctx.fillStyle = '#e67e22';
            ctx.beginPath();
            ctx.moveTo(100, birdY);
            ctx.lineTo(115, birdY + 5);
            ctx.lineTo(100, birdY + 10);
            ctx.fill();
        }
        
        function update() {
            if (!gameRunning) return;
            
            // Bird physics
            birdVelocity += gravity;
            birdY += birdVelocity;
            
            // Ground/ceiling collision
            if (birdY > canvas.height - birdSize || birdY < birdSize) {
                gameOver();
                return;
            }
            
            // Move pipes
            pipes.forEach(pipe => {
                pipe.x -= 3;
                
                // Score
                if (pipe.x + pipeWidth === 77) {
                    score++;
                    scoreDisplay.textContent = score;
                }
                
                // Collision
                if (80 + birdSize > pipe.x && 80 - birdSize < pipe.x + pipeWidth) {
                    if (birdY - birdSize < pipe.topHeight || birdY + birdSize > pipe.topHeight + pipeGap) {
                        gameOver();
                        return;
                    }
                }
            });
            
            // Remove old pipes
            pipes = pipes.filter(pipe => pipe.x > -pipeWidth);
            
            // Add new pipes
            if (pipes.length === 0 || pipes[pipes.length - 1].x < canvas.width - 200) {
                pipes.push({
                    x: canvas.width,
                    topHeight: Math.random() * (canvas.height - pipeGap - 100) + 50
                });
            }
            
            draw();
            animationId = requestAnimationFrame(update);
        }
        
        function jump() {
            if (gameRunning) {
                birdVelocity = jumpStrength;
            }
        }
        
        function gameOver() {
            gameRunning = false;
            cancelAnimationFrame(animationId);
            startBtn.textContent = `Game Over! Score: ${score} - Play Again`;
            startBtn.style.display = 'block';
        }
        
        canvas.addEventListener('click', jump);
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                jump();
            }
        });
        
        startBtn.addEventListener('click', () => {
            birdY = canvas.height / 2;
            birdVelocity = 0;
            pipes = [];
            score = 0;
            scoreDisplay.textContent = '0';
            gameRunning = true;
            startBtn.style.display = 'none';
            update();
        });
        
        draw();
    </script>
</body>
</html>
