<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Trading Card Generator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: white;
            padding: 20px;
        }
        .back-btn {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(255,255,255,0.9);
            color: #333;
            padding: 6px 12px;
            text-decoration: none;
            border-radius: 6px;
            z-index: 100;
            font-weight: bold;
            font-size: 0.85rem;
        }
        h1 {
            text-align: center;
            margin: 20px 0 30px;
            font-size: 2rem;
            text-shadow: 0 0 20px rgba(255,255,255,0.3);
        }
        .container {
            display: flex;
            gap: 40px;
            max-width: 1100px;
            margin: 0 auto;
            flex-wrap: wrap;
            justify-content: center;
        }
        
        /* Form side */
        .form-section {
            flex: 1;
            min-width: 300px;
            max-width: 400px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: bold;
            color: #aaa;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #444;
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 1rem;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: #ffd700;
        }
        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }
        .form-group select option {
            background: #1a1a2e;
            color: white;
        }
        .stat-row {
            display: flex;
            gap: 15px;
        }
        .stat-row .form-group {
            flex: 1;
        }
        .move-row {
            display: flex;
            gap: 10px;
        }
        .move-row input:first-child {
            flex: 1;
        }
        .generate-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            border: none;
            border-radius: 10px;
            color: #000;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .generate-btn:hover {
            transform: scale(1.02);
        }
        .add-art-btn, .upload-btn {
            flex: 1;
            padding: 12px;
            background: linear-gradient(135deg, #4CAF50, #2E7D32);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
            transition: transform 0.2s;
        }
        .add-art-btn:hover, .upload-btn:hover {
            transform: scale(1.02);
        }
        .print-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #2196F3, #1565C0);
            border: none;
            border-radius: 8px;
            color: white;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
            transition: transform 0.2s;
        }
        .print-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
        }
        
        /* Card preview side */
        .preview-section {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .preview-label {
            font-size: 1.2rem;
            color: #888;
            margin-bottom: 15px;
        }
        
        /* The Card */
        .card {
            width: 300px;
            height: 420px;
            border-radius: 15px;
            padding: 12px;
            position: relative;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            transition: all 0.3s;
        }
        .card:hover {
            transform: rotateY(5deg) rotateX(5deg);
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }
        
        /* Card types */
        .card.fire { background: linear-gradient(135deg, #ff4444, #ff8800, #ffaa00); }
        .card.water { background: linear-gradient(135deg, #0077be, #00aaff, #00ddff); }
        .card.earth { background: linear-gradient(135deg, #8B4513, #654321, #3d2914); }
        .card.air { background: linear-gradient(135deg, #87CEEB, #b0e0e6, #f0f8ff); }
        .card.electric { background: linear-gradient(135deg, #ffd700, #ffff00, #fffacd); }
        .card.shadow { background: linear-gradient(135deg, #2d1b4e, #1a0a2e, #0d0015); }
        .card.light { background: linear-gradient(135deg, #fff8dc, #fffacd, #ffffff); }
        .card.nature { background: linear-gradient(135deg, #228B22, #32CD32, #90EE90); }
        
        .card-inner {
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            height: 100%;
            padding: 10px;
            display: flex;
            flex-direction: column;
        }
        
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .card-name {
            font-size: 1.1rem;
            font-weight: bold;
            text-shadow: 1px 1px 2px #000;
        }
        .card-type-icon {
            font-size: 1.3rem;
        }
        
        .card-image {
            flex: 1;
            background: rgba(0,0,0,0.4);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            margin-bottom: 8px;
            overflow: hidden;
            position: relative;
        }
        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .card-image .placeholder {
            color: #555;
            font-size: 1rem;
            text-align: center;
            padding: 20px;
        }
        
        .card-rarity {
            text-align: center;
            margin-bottom: 5px;
        }
        .rarity-stars {
            color: #ffd700;
            font-size: 1rem;
            text-shadow: 0 0 5px #ffd700;
        }
        .rarity-common .rarity-stars { color: #888; text-shadow: none; }
        .rarity-uncommon .rarity-stars { color: #4CAF50; text-shadow: 0 0 5px #4CAF50; }
        .rarity-rare .rarity-stars { color: #2196F3; text-shadow: 0 0 5px #2196F3; }
        .rarity-epic .rarity-stars { color: #9C27B0; text-shadow: 0 0 5px #9C27B0; }
        .rarity-legendary .rarity-stars { color: #ffd700; text-shadow: 0 0 10px #ffd700; }
        .rarity-godly .rarity-stars { 
            color: #ff00ff;
            text-shadow: 0 0 10px #ff00ff, 0 0 20px #00ffff, 0 0 30px #ff00ff;
            animation: godlyGlow 1s ease-in-out infinite alternate;
            font-size: 1.1rem;
        }
        @keyframes godlyGlow {
            0% { text-shadow: 0 0 10px #ff00ff, 0 0 20px #00ffff; }
            100% { text-shadow: 0 0 20px #00ffff, 0 0 30px #ff00ff, 0 0 40px #fff; }
        }
        .card.godly {
            background: linear-gradient(135deg, #ff00ff, #00ffff, #ff00ff, #ffff00, #ff00ff);
            background-size: 400% 400%;
            animation: godlyCard 3s ease infinite;
        }
        @keyframes godlyCard {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .rarity-secret .rarity-stars { 
            color: #000;
            text-shadow: 0 0 8px #fff, 0 0 15px #fff;
            font-size: 1.2rem;
        }
        .card.secret { 
            background: linear-gradient(135deg, #000 0%, #333 25%, #fff 50%, #333 75%, #000 100%);
            background-size: 200% 200%;
            animation: secretCard 3s ease infinite;
        }
        @keyframes secretCard {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        .card-desc {
            background: rgba(255,255,255,0.1);
            border-radius: 5px;
            padding: 8px;
            font-size: 0.75rem;
            margin-bottom: 8px;
            min-height: 45px;
        }
        
        .card-moves {
            background: rgba(0,0,0,0.3);
            border-radius: 5px;
            padding: 6px;
        }
        .move {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 5px 8px;
            margin-bottom: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
        }
        .move:last-child {
            margin-bottom: 0;
        }
        .move-name {
            font-size: 0.8rem;
            font-weight: bold;
        }
        .move-dmg {
            font-size: 0.9rem;
            font-weight: bold;
            color: #ff6b6b;
            background: rgba(0,0,0,0.3);
            padding: 2px 8px;
            border-radius: 10px;
        }
        
        /* Generated prompt display */
        .prompt-display {
            margin-top: 20px;
            background: rgba(0,0,0,0.3);
            border-radius: 10px;
            padding: 15px;
            display: none;
        }
        .prompt-display.active { display: block; }
        .prompt-display h3 {
            color: #ffd700;
            margin-bottom: 10px;
        }
        .prompt-display p {
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 5px;
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 10px;
        }
        .prompt-display .hint {
            color: #888;
            font-size: 0.85rem;
        }
        .copy-btn {
            background: #4CAF50;
            border: none;
            padding: 8px 15px;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            margin-top: 10px;
        }
        .copy-btn:hover { background: #45a049; }
        
        /* Print styles */
        @media print {
            body {
                background: white !important;
                padding: 0 !important;
                margin: 0 !important;
            }
            body * {
                visibility: hidden;
            }
            .preview-section, .card, .card * {
                visibility: visible;
            }
            .preview-section {
                position: absolute;
                left: 0;
                top: 0;
                width: 100%;
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                margin: 0;
                padding: 20px;
            }
            .preview-label {
                display: none !important;
            }
            .card {
                position: relative;
                left: auto;
                top: auto;
                transform: none;
                width: 280px !important;
                height: 400px !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
                color-adjust: exact;
                box-shadow: none;
            }
            .card:hover {
                transform: none;
            }
        }
    </style>
</head>
<body>
    <a href="../" class="back-btn">← Back</a>
    
    <h1>🎴 Trading Card Generator</h1>
    
    <div class="container">
        <div class="form-section">
            <div class="form-group">
                <label>Card Name</label>
                <input type="text" id="cardName" placeholder="Enter card name..." value="Shadow Dragon">
            </div>
            
            <div class="form-group">
                <label>Element Type</label>
                <select id="cardType">
                    <option value="fire">🔥 Fire</option>
                    <option value="water">💧 Water</option>
                    <option value="earth">🪨 Earth</option>
                    <option value="air">💨 Air</option>
                    <option value="electric">⚡ Electric</option>
                    <option value="shadow" selected>🌑 Shadow</option>
                    <option value="light">✨ Light</option>
                    <option value="nature">🌿 Nature</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>Rarity</label>
                <select id="cardRarity">
                    <option value="common">Common ★</option>
                    <option value="uncommon">Uncommon ★★</option>
                    <option value="rare">Rare ★★★</option>
                    <option value="epic">Epic ★★★★</option>
                    <option value="legendary" selected>Legendary ★★★★★</option>
                    <option value="godly">✦ GODLY ✦</option>
                    <option value="secret">??? SECRET ???</option>
                </select>
            </div>
            
            <div class="form-group">
                <label>⚡ Move 1</label>
                <div class="move-row">
                    <input type="text" id="move1Name" placeholder="Move name..." value="Thunder Strike">
                    <input type="number" id="move1Dmg" placeholder="DMG" value="40" min="0" max="999" style="width: 70px;">
                </div>
            </div>
            <div class="form-group">
                <label>🔥 Move 2</label>
                <div class="move-row">
                    <input type="text" id="move2Name" placeholder="Move name..." value="Volt Surge">
                    <input type="number" id="move2Dmg" placeholder="DMG" value="80" min="0" max="999" style="width: 70px;">
                </div>
            </div>
            
            <div class="form-group">
                <label>Description</label>
                <textarea id="cardDesc" placeholder="Card description/lore...">A fearsome dragon born from the darkest shadows. Its eyes gleam with ancient power.</textarea>
            </div>
            
            <div class="form-group">
                <label>🎨 Art Style (for AI generation)</label>
                <textarea id="artStyle" placeholder="Describe the art style you want...">epic fantasy art, dark and dramatic lighting, detailed scales, glowing purple eyes, manga style</textarea>
            </div>
            
            <button class="generate-btn" onclick="generateCard()">✨ Get ChatGPT Prompt</button>
            
            <div class="form-group" style="margin-top: 20px;">
                <label>🖼️ Add Art to Card (paste image URL)</label>
                <input type="text" id="imageUrl" placeholder="Paste image URL here...">
            </div>
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <button class="add-art-btn" onclick="addArtFromUrl()">🖼️ Add Art</button>
                <label class="upload-btn">
                    📁 Upload Image
                    <input type="file" id="imageUpload" accept="image/*" onchange="uploadImage(event)" style="display: none;">
                </label>
            </div>
            
            <button class="print-btn" onclick="printCard()">🖨️ Print Card</button>
            
            <div class="prompt-display" id="promptDisplay">
                <h3>📋 Prompt for ChatGPT</h3>
                <p id="generatedPrompt"></p>
                <p class="hint">👆 Copy this and paste it into ChatGPT to generate your card art!</p>
                <button class="copy-btn" onclick="copyPrompt()">📋 Copy to Clipboard</button>
            </div>
        </div>
        
        <div class="preview-section">
            <div class="preview-label">Live Preview</div>
            <div class="card shadow" id="cardPreview">
                <div class="card-inner">
                    <div class="card-header">
                        <span class="card-name" id="previewName">Shadow Dragon</span>
                        <span class="card-type-icon" id="previewTypeIcon">🌑</span>
                    </div>
                    <div class="card-image" id="previewImage">
                        <div class="placeholder">🎨<br>Art will appear here!</div>
                    </div>
                    <div class="card-rarity rarity-legendary" id="previewRarity">
                        <span class="rarity-stars">★★★★★</span>
                    </div>
                    <div class="card-desc" id="previewDesc">A fearsome dragon born from the darkest shadows. Its eyes gleam with ancient power.</div>
                    <div class="card-moves">
                        <div class="move" id="previewMove1">
                            <span class="move-name">Thunder Strike</span>
                            <span class="move-dmg">40</span>
                        </div>
                        <div class="move" id="previewMove2">
                            <span class="move-name">Volt Surge</span>
                            <span class="move-dmg">80</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const typeIcons = {
            fire: '🔥', water: '💧', earth: '🪨', air: '💨',
            electric: '⚡', shadow: '🌑', light: '✨', nature: '🌿'
        };
        
        const rarityStars = {
            common: '★',
            uncommon: '★★',
            rare: '★★★',
            epic: '★★★★',
            legendary: '★★★★★',
            godly: '✦✦✦✦✦✦',
            secret: '✦✦✦✦✦✦✦'
        };
        
        // Update preview in real-time
        function updatePreview() {
            const name = document.getElementById('cardName').value || 'Unnamed';
            const type = document.getElementById('cardType').value;
            const rarity = document.getElementById('cardRarity').value;
            const move1Name = document.getElementById('move1Name').value || 'Move 1';
            const move1Dmg = document.getElementById('move1Dmg').value || '0';
            const move2Name = document.getElementById('move2Name').value || 'Move 2';
            const move2Dmg = document.getElementById('move2Dmg').value || '0';
            const desc = document.getElementById('cardDesc').value || 'No description';
            
            document.getElementById('previewName').textContent = name;
            document.getElementById('previewTypeIcon').textContent = typeIcons[type];
            document.getElementById('previewMove1').innerHTML = `<span class="move-name">${move1Name}</span><span class="move-dmg">${move1Dmg}</span>`;
            document.getElementById('previewMove2').innerHTML = `<span class="move-name">${move2Name}</span><span class="move-dmg">${move2Dmg}</span>`;
            document.getElementById('previewDesc').textContent = desc;
            
            // Update card background
            const card = document.getElementById('cardPreview');
            if (rarity === 'secret') {
                card.className = 'card secret';
            } else if (rarity === 'godly') {
                card.className = 'card godly';
            } else {
                card.className = 'card ' + type;
            }
            
            // Update rarity
            const rarityEl = document.getElementById('previewRarity');
            rarityEl.className = 'card-rarity rarity-' + rarity;
            rarityEl.querySelector('.rarity-stars').textContent = rarityStars[rarity];
        }
        
        // Add listeners to all inputs
        document.querySelectorAll('input, select, textarea').forEach(el => {
            el.addEventListener('input', updatePreview);
        });
        
        // Generate card request
        function generateCard() {
            const name = document.getElementById('cardName').value || 'Unnamed Card';
            const type = document.getElementById('cardType').value;
            const rarity = document.getElementById('cardRarity').value;
            const artStyle = document.getElementById('artStyle').value || 'fantasy art style';
            
            const prompt = `Generate trading card art for a card called "${name}". 

It's a ${rarity} ${type} type card.

Art style: ${artStyle}

Make it vertical/portrait orientation like a trading card. Don't include any text on the image - just the artwork.`;
            
            document.getElementById('generatedPrompt').textContent = prompt;
            document.getElementById('promptDisplay').classList.add('active');
        }
        
        // Copy prompt
        function copyPrompt() {
            const prompt = document.getElementById('generatedPrompt').textContent;
            navigator.clipboard.writeText(prompt).then(() => {
                const btn = document.querySelector('.copy-btn');
                btn.textContent = '✅ Copied!';
                setTimeout(() => { btn.textContent = '📋 Copy to Clipboard'; }, 2000);
            });
        }
        
        // Add art from URL
        function addArtFromUrl() {
            const url = document.getElementById('imageUrl').value.trim();
            if (!url) {
                alert('Please paste an image URL first!');
                return;
            }
            setCardImage(url);
        }
        
        // Upload image
        function uploadImage(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    setCardImage(e.target.result);
                };
                reader.readAsDataURL(file);
            }
        }
        
        // Set card image
        function setCardImage(src) {
            const imageDiv = document.getElementById('previewImage');
            imageDiv.innerHTML = `<img src="${src}" alt="Card Art" onerror="this.parentElement.innerHTML='<div class=\\'placeholder\\'>❌ Image failed to load</div>'">`;
        }
        
        // Print card
        function printCard() {
            window.print();
        }
        
        // Initial update
        updatePreview();
    </script>
</body>
</html>
