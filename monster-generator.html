<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monster Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', 'Times New Roman', serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a0a1a 100%);
            background-image: 
                radial-gradient(circle at 20% 50%, rgba(139, 0, 139, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(139, 0, 0, 0.1) 0%, transparent 50%);
            color: #e0d0e0;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: #c850c8;
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(200, 80, 200, 0.6), 2px 2px 4px rgba(0,0,0,0.8);
            letter-spacing: 2px;
            font-weight: bold;
        }

        .subtitle {
            text-align: center;
            color: #a040a0;
            margin-bottom: 30px;
            font-size: 1.2em;
            font-style: italic;
        }

        .controls {
            background: linear-gradient(135deg, rgba(60, 20, 60, 0.4) 0%, rgba(80, 0, 0, 0.3) 100%);
            border: 3px solid #8b008b;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 8px 16px rgba(139, 0, 139, 0.4), inset 0 1px 0 rgba(200, 80, 200, 0.2);
        }

        .control-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            color: #c850c8;
            margin-bottom: 5px;
            font-weight: bold;
            font-size: 1.1em;
            text-shadow: 0 0 10px rgba(200, 80, 200, 0.5);
        }

        select {
            width: 100%;
            padding: 12px;
            background: rgba(20, 5, 20, 0.8);
            color: #e0d0e0;
            border: 2px solid #8b008b;
            border-radius: 8px;
            font-family: 'Georgia', serif;
            font-size: 1em;
            cursor: pointer;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 15px;
            font-size: 1.1em;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            transition: all 0.3s;
        }

        .generate-btn {
            background: linear-gradient(135deg, #8b008b 0%, #c850c8 100%);
            color: #fff;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
            box-shadow: 0 4px 8px rgba(139, 0, 139, 0.5);
        }

        .generate-btn:hover {
            background: linear-gradient(135deg, #c850c8 0%, #ff00ff 100%);
            transform: scale(1.05);
            box-shadow: 0 6px 12px rgba(200,80,200,0.6);
        }

        .save-btn {
            background: linear-gradient(135deg, #500000 0%, #8b0000 100%);
            color: #fff;
            box-shadow: 0 4px 8px rgba(139, 0, 0, 0.5);
        }

        .save-btn:hover {
            background: linear-gradient(135deg, #8b0000 0%, #dc143c 100%);
            transform: scale(1.05);
            box-shadow: 0 6px 12px rgba(139,0,0,0.6);
        }

        .save-btn:disabled {
            background: #555;
            cursor: not-allowed;
            transform: none;
        }

        .monster-card {
            background: linear-gradient(135deg, rgba(60, 20, 60, 0.4) 0%, rgba(80, 0, 0, 0.4) 100%);
            border: 3px solid #8b008b;
            border-radius: 15px;
            margin-bottom: 20px;
            transition: all 0.3s;
            display: none;
            box-shadow: 0 8px 20px rgba(139, 0, 139, 0.4), inset 0 1px 0 rgba(200, 80, 200, 0.2);
            overflow: hidden;
        }

        .monster-card.show {
            display: block;
            padding: 30px;
            animation: fadeIn 0.5s;
        }

        .monster-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 30px rgba(200,80,200,0.5), inset 0 1px 0 rgba(255,255,255,0.2);
            border-color: #c850c8;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .grid-item {
            background: rgba(20, 5, 20, 0.5);
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #6b006b;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .monster-name {
            font-size: 2.5em;
            color: #c850c8;
            margin-bottom: 10px;
            text-align: center;
            text-shadow: 0 0 20px rgba(200, 80, 200, 0.6), 2px 2px 4px rgba(0,0,0,0.8);
            font-weight: bold;
        }

        .danger-level {
            text-align: center;
            font-size: 1.5em;
            margin-bottom: 15px;
            color: #a040a0;
        }

        .skull {
            color: #dc143c;
        }

        .monster-type {
            text-align: center;
            color: #bbb;
            font-style: italic;
            margin-bottom: 20px;
        }

        .detail-section {
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-radius: 5px;
        }

        .detail-title {
            color: #c850c8;
            font-size: 1.3em;
            margin-bottom: 8px;
            border-bottom: 2px solid #8b008b;
            padding-bottom: 5px;
            text-shadow: 0 0 10px rgba(200, 80, 200, 0.5);
        }

        .detail-content {
            color: #e0d0e0;
            line-height: 1.8;
            font-size: 1.05em;
        }

        .stat-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }

        .stat-item {
            background: rgba(60, 20, 60, 0.4);
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #8b008b;
        }

        .stat-label {
            color: #c850c8;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .tag {
            display: inline-block;
            background: rgba(40, 10, 40, 0.6);
            padding: 8px 14px;
            margin: 5px 5px 5px 0;
            border-radius: 8px;
            border: 2px solid #8b008b;
            color: #c850c8;
            font-weight: bold;
            box-shadow: 0 2px 4px rgba(139, 0, 139, 0.5);
        }

        .saved-monsters {
            background: linear-gradient(135deg, rgba(60, 20, 60, 0.4) 0%, rgba(80, 0, 0, 0.3) 100%);
            border: 3px solid #8b008b;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 8px 16px rgba(139, 0, 139, 0.4), inset 0 1px 0 rgba(200, 80, 200, 0.2);
        }

        .saved-monsters h2 {
            color: #c850c8;
            margin-bottom: 15px;
            text-align: center;
            text-shadow: 0 0 20px rgba(200, 80, 200, 0.6);
        }

        .saved-item {
            background: rgba(255,255,255,0.03);
            border: 1px solid #555;
            border-radius: 5px;
            padding: 15px;
            margin-bottom: 10px;
            position: relative;
            cursor: pointer;
            transition: all 0.3s;
        }

        .saved-item:hover {
            background: rgba(255,255,255,0.08);
            transform: translateX(5px);
        }

        .saved-item h3 {
            color: #c850c8;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(200, 80, 200, 0.4);
        }

        .saved-item p {
            color: #a040a0;
            font-size: 0.9em;
        }

        .delete-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #e74c3c;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 0.9em;
            z-index: 10;
        }

        .delete-btn:hover {
            background: #c0392b;
        }

        .empty-state {
            text-align: center;
            color: #777;
            padding: 20px;
            font-style: italic;
        }

        .expanded-view {
            display: none;
        }

        .expanded-view.show {
            display: block;
        }

        .click-hint {
            text-align: center;
            color: #888;
            font-size: 0.9em;
            margin-top: 10px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👹 Monster Generator</h1>
        <p class="subtitle">Create Creatures for Your Fantasy World</p>

        <div class="controls">
            <div class="control-group">
                <label for="vibe">Monster Vibe:</label>
                <select id="vibe">

                    <option value="dark">Dark/Horror</option>
                    <option value="classic">Classic Fantasy</option>
                    <option value="weird">Weird/Surreal</option>
                    <option value="epic">Epic/Legendary</option>
                    <option value="cute">Cute but Dangerous</option>
                </select>
            </div>

            <div class="buttons">
                <button class="generate-btn" onclick="generateMonster()">Generate Monster</button>
                <button class="save-btn" id="saveBtn" onclick="saveMonster()" disabled>Save Monster</button>
            </div>
        </div>

        <div class="monster-card" id="monsterCard">
            <div class="monster-name" id="monsterName"></div>
            <div class="danger-level" id="dangerLevel"></div>
            <div class="monster-type" id="monsterType"></div>
            
            <div class="info-grid">
                <div class="grid-item">
                    <div class="detail-title">👁️ Appearance</div>
                    <div class="detail-content" id="appearance"></div>
                </div>

                <div class="grid-item">
                    <div class="detail-title">🗺️ Habitat</div>
                    <div class="detail-content" id="habitat"></div>
                </div>

                <div class="grid-item">
                    <div class="detail-title">🎲 Stats</div>
                    <div class="stat-grid">
                        <div class="stat-item">
                            <div class="stat-label">Health</div>
                            <div id="statHealth"></div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">Attack</div>
                            <div id="statAttack"></div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">Defense</div>
                            <div id="statDefense"></div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-label">Speed</div>
                            <div id="statSpeed"></div>
                        </div>
                    </div>
                </div>

                <div class="grid-item">
                    <div class="detail-title">⚔️ Abilities & Powers</div>
                    <div class="detail-content" id="abilities"></div>
                </div>

                <div class="grid-item">
                    <div class="detail-title">💀 Weaknesses</div>
                    <div class="detail-content" id="weaknesses"></div>
                </div>

                <div class="grid-item">
                    <div class="detail-title">📖 Lore</div>
                    <div class="detail-content" id="lore"></div>
                </div>
            </div>
        </div>

        <div class="saved-monsters">
            <h2>💾 Monster Collection</h2>
            <div id="savedList"></div>
        </div>
    </div>

    <script>
        let currentMonster = null;
        let expandedMonster = null;

        const monsterData = {

                types: ["Reality Distortion", "Temporal Anomaly", "Dimensional Being", "Conceptual Entity", "Impossible Creature"],

                    "Its geometry doesn't make sense. Limbs connect at angles that hurt to perceive. Looking at it gives you a headache.",

                suffixes: ["Puff", "Sprite", "Nibbler", "Hopper", "Floof", "Squeaker", "Bouncer", "Muncher", "Snuggler", "Doodlebug"],

        function random(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function randomStat() {
            return Math.floor(Math.random() * 100) + 1;
        }

        function generateMonster() {
            const vibe = document.getElementById('vibe').value;
            const data = monsterData[vibe];

            const name = `${random(data.prefixes)} ${random(data.suffixes)}`;
            const dangerLevel = Math.floor(Math.random() * 5) + 1;
            const type = random(data.types);
            const appearance = random(data.appearances);
            
            const abilities = [];
            const numAbilities = 2 + Math.floor(Math.random() * 3);
            for (let i = 0; i < numAbilities; i++) {
                const ability = random(data.abilities);
                if (!abilities.includes(ability)) abilities.push(ability);
            }

            const weaknesses = [];
            const numWeaknesses = 1 + Math.floor(Math.random() * 2);
            for (let i = 0; i < numWeaknesses; i++) {
                const weakness = random(data.weaknesses);
                if (!weaknesses.includes(weakness)) weaknesses.push(weakness);
            }

            const habitat = random(data.habitats);
            const lore = random(data.lore);

            currentMonster = {
                name,
                vibe,
                dangerLevel,
                type,
                appearance,
                abilities,
                weaknesses,
                habitat,
                lore,
                stats: {
                    health: randomStat(),
                    attack: randomStat(),
                    defense: randomStat(),
                    speed: randomStat()
                },
                timestamp: new Date().toLocaleString()
            };

            displayMonster(currentMonster);
            document.getElementById('saveBtn').disabled = false;
            document.getElementById('expandedView').classList.remove('show');
        }

        function displayMonster(monster) {
            document.getElementById('monsterName').textContent = monster.name;
            
            const skulls = '💀'.repeat(monster.dangerLevel);
            document.getElementById('dangerLevel').innerHTML = `<span class="skull">${skulls}</span> Danger Level ${monster.dangerLevel}/5`;
            
            document.getElementById('monsterType').textContent = monster.type;
            document.getElementById('appearance').textContent = monster.appearance;
            document.getElementById('habitat').textContent = monster.habitat;
            
            document.getElementById('abilities').innerHTML = monster.abilities
                .map(a => `<span class="tag">${a}</span>`).join('');
            
            document.getElementById('weaknesses').innerHTML = monster.weaknesses
                .map(w => `<span class="tag">${w}</span>`).join('');
            
            document.getElementById('lore').textContent = monster.lore;

            document.getElementById('statHealth').textContent = monster.stats.health;
            document.getElementById('statAttack').textContent = monster.stats.attack;
            document.getElementById('statDefense').textContent = monster.stats.defense;
            document.getElementById('statSpeed').textContent = monster.stats.speed;

            document.getElementById('monsterCard').classList.add('show');
        }

        function saveMonster() {
            if (!currentMonster) return;

            const saved = JSON.parse(localStorage.getItem('savedMonsters') || '[]');
            saved.unshift(currentMonster);
            localStorage.setItem('savedMonsters', JSON.stringify(saved));

            document.getElementById('saveBtn').disabled = true;
            loadSavedMonsters();
        }

        function deleteMonster(index, event) {
            event.stopPropagation();
            const saved = JSON.parse(localStorage.getItem('savedMonsters') || '[]');
            saved.splice(index, 1);
            localStorage.setItem('savedMonsters', JSON.stringify(saved));
            loadSavedMonsters();
        }

        function viewSavedMonster(index, event) {
            if (event.target.classList.contains('delete-btn')) return;
            
            const saved = JSON.parse(localStorage.getItem('savedMonsters') || '[]');
            const monster = saved[index];
            
            currentMonster = monster;
            displayMonster(monster);
            document.getElementById('saveBtn').disabled = true;
            document.getElementById('expandedView').classList.add('show');
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function loadSavedMonsters() {
            const saved = JSON.parse(localStorage.getItem('savedMonsters') || '[]');
            const container = document.getElementById('savedList');

            if (saved.length === 0) {
                container.innerHTML = '<div class="empty-state">No monsters saved yet. Generate and save some creatures!</div>';
                return;
            }

            container.innerHTML = saved.map((monster, index) => `
                <div class="saved-item" onclick="viewSavedMonster(${index}, event)">
                    <button class="delete-btn" onclick="deleteMonster(${index}, event)">Delete</button>
                    <h3>${monster.name}</h3>
                    <p>${'💀'.repeat(monster.dangerLevel)} | ${monster.type}</p>
                    <p><strong>Saved:</strong> ${monster.timestamp}</p>
                </div>
            `).join('');
        }

        loadSavedMonsters();
    </script>
</body>
</html>
